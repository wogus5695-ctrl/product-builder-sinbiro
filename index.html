<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>신비로 - 신묘한 사주 풀이와 오늘의 운세</title>
    <meta name="description" content="당신의 타고난 기운과 운명을 풀어드립니다. 성명, 생년월일시로 보는 정교한 사주 풀이와 무료 로또 번호 추첨까지 경험해보세요.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=Song Myung&display=swap"
        rel="stylesheet">
    <!-- 구글 애드센스 스크립트 -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5994028801063205"
        crossorigin="anonymous"></script>
</head>

<body>
    <div class="fog-overlay"></div>

    <header>
        <div class="logo">
            <h1>신비로(信秘路)</h1>
            <p>당신의 운명을 비추는 신묘한 길</p>
        </div>
    </header>

    <main id="app">
        <!-- 광고 영역 상단 -->
        <div class="adsense-placeholder top-ad">
        </div>

        <!-- 입력 퍼널 섹션 -->
        <section id="funnel" class="card active">
            <div class="card-header">
                <h2>사주 정보 입력</h2>
                <p>정확한 풀이를 위해 정보를 입력해 주세요.</p>
            </div>
            <form id="sajuForm">
                <div class="input-group">
                    <label for="userName">이름</label>
                    <input type="text" id="userName" placeholder="이름을 입력하세요" required>
                </div>
                <div class="input-group">
                    <label>생년월일</label>
                    <div class="scroll-inputs">
                        <select id="birthYear" required></select>
                        <select id="birthMonth" required></select>
                        <select id="birthDay" required></select>
                        <select id="calendarType">
                            <option value="solar">양력</option>
                            <option value="lunar">음력</option>
                        </select>
                    </div>
                </div>
                <div class="input-group">
                    <label>태어난 시간</label>
                    <div class="scroll-inputs">
                        <select id="birthAmPm">
                            <option value="AM">오전</option>
                            <option value="PM">오후</option>
                        </select>
                        <select id="birthHour"></select>
                        <select id="birthMinute"></select>
                    </div>
                </div>
                <div class="input-group">
                    <label>성별</label>
                    <div class="radio-group">
                        <label><input type="radio" name="gender" value="male" checked> 남성</label>
                        <label><input type="radio" name="gender" value="female"> 여성</label>
                    </div>
                </div>
                <button type="submit" id="submitBtn">결과보기</button>
            </form>
        </section>

        <!-- 결과 출력 섹션 -->
        <section id="result" class="card hidden">
            <div id="resultContent">
                <!-- 결과 내용이 자바스크립트로 삽입됩니다 -->
            </div>

            <!-- 광고 영역 중앙 -->
            <div class="adsense-placeholder mid-ad">
            </div>

            <!-- 로또 섹션 -->
            <div id="lotto-section">
                <h3>이번 주 신비로운 로또 추천 번호</h3>
                <p>이 신비로운 기운을 공유하면 번호가 나타납니다.</p>
                <div id="lotto-numbers-container">
                    <div class="lotto-blur">
                        <div class="slot">?</div>
                        <div class="slot">?</div>
                        <div class="slot">?</div>
                        <div class="slot">?</div>
                        <div class="slot">?</div>
                        <div class="slot">?</div>
                    </div>
                </div>
                <button id="shareBtn">행운 공유하고 번호 확인하기</button>
            </div>
        </section>

        <!-- 광고 영역 하단 -->
        <div class="adsense-placeholder bottom-ad">
        </div>
    </main>

    <footer>
        <p>&copy; 2026 신비로(Sinbi-ro). All rights reserved.</p>
        <p>본 서비스는 통계적 명리학을 바탕으로 제작되었으며, 참고용으로만 사용해 주세요.</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
